<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengaturan</title>
    <link href="./output.css" rel="stylesheet">
</head>
<body>
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-6 py-3">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <div class="flex items-center gap-2 text-blue-600 font-black text-2xl hover:text-blue-700 cursor-pointer">
                        <i class="fa-solid fa-plane"></i>
                        <span>GoTrip</span>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <a href="index.html" class="px-4 py-2 text-gray-700 font-medium hover:bg-gray-100 rounded-lg transition">
                        <i class="fa-solid fa-home mr-2"></i>Beranda
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-6 py-10">
        <h1 class="text-4xl font-bold text-gray-800 mb-8">Pengaturan Akun</h1>

        <!-- Alert Box -->
        <div id="alert-box" class="hidden mb-6 px-4 py-3 rounded-lg text-sm font-medium animate-fade-in"></div>

        <!-- Ubah Profil -->
        <div class="bg-white shadow-md rounded-lg p-6 mb-6">
            <h2 class="text-2xl font-semibold text-gray-700 mb-4">Ubah Profil</h2>
            <form id="ubah-profil-form">
                <div class="mb-4">
                    <label for="nama" class="block text-gray-700 text-sm font-bold mb-2">Nama:</label>
                    <input type="text" id="nama" name="nama" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" placeholder="Masukkan nama baru">
                </div>
                <div class="mb-4">
                    <label for="nomor_hp" class="block text-gray-700 text-sm font-bold mb-2">Nomor HP:</label>
                    <input type="text" id="nomor_hp" name="nomor_hp" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" placeholder="Masukkan nomor HP baru">
                </div>
                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline">Simpan Perubahan</button>
            </form>
        </div>

        <!-- Ubah Password -->
        <div class="bg-white shadow-md rounded-lg p-6 mb-6">
            <h2 class="text-2xl font-semibold text-gray-700 mb-4">Ubah Kata Sandi</h2>
            <form id="ubah-password-form">
                <div class="mb-4">
                    <label for="current_password" class="block text-gray-700 text-sm font-bold mb-2">Kata Sandi Saat Ini:</label>
                    <input type="password" id="current_password" name="current_password" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" placeholder="Kata sandi saat ini">
                </div>
                <div class="mb-4">
                    <label for="new_password" class="block text-gray-700 text-sm font-bold mb-2">Kata Sandi Baru:</label>
                    <input type="password" id="new_password" name="new_password" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" placeholder="Kata sandi baru">
                </div>
                <div class="mb-6">
                    <label for="confirm_password" class="block text-gray-700 text-sm font-bold mb-2">Konfirmasi Kata Sandi Baru:</label>
                    <input type="password" id="confirm_password" name="confirm_password" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" placeholder="Konfirmasi kata sandi baru">
                </div>
                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline">Ubah Kata Sandi</button>
            </form>
        </div>

        <!-- Hapus Akun -->
        <div class="bg-white shadow-md rounded-lg p-6">
            <h2 class="text-2xl font-semibold text-gray-700 mb-4">Hapus Akun</h2>
            <p class="text-gray-600 mb-4">Menghapus akun akan menghapus semua data Anda secara permanen. Tindakan ini tidak dapat dibatalkan.</p>
            <button id="hapus-akun-btn" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline">Hapus Akun</button>
        
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const namaInput = document.getElementById('nama');
            const nomorHpInput = document.getElementById('nomor_hp');
            const updateProfileForm = document.querySelector('#ubah-profil-form');
            const currentPasswordInput = document.getElementById('current_password');
            const newPasswordInput = document.getElementById('new_password');
            const confirmPasswordInput = document.getElementById('confirm_password');
            const changePasswordForm = document.querySelector('#ubah-password-form');
            const deleteAccountButton = document.getElementById('hapus-akun-btn');

            const alertBox = document.getElementById('alert-box');
            

        

            const showMessage = (message, type = 'success') => {
                alertBox.textContent = message;
                alertBox.classList.remove('hidden', 'bg-red-50', 'text-red-600', 'bg-green-50', 'text-green-600');
                if (type === 'error') {
                    alertBox.classList.add('bg-red-50', 'text-red-600');
                } else {
                    alertBox.classList.add('bg-green-50', 'text-green-600');
                }
                alertBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
            };

            const fetchUserData = async () => {
                try {
                    const response = await fetch('/api/me', { credentials: 'include' });
                    const data = await response.json();
                    if (response.ok) {
                        namaInput.value = data.user.nama || '';
                        nomorHpInput.value = data.user.phone || '';
                    } else {
                        showMessage(`Gagal memuat data pengguna: ${data.message}`, 'error');
                        if (response.status === 401) {
                            window.location.href = 'login.html';
                        }
                    }
                } catch (error) {
                    console.error('Error fetching user data:', error);
                    showMessage('Terjadi kesalahan saat memuat data pengguna.', 'error');
                }
            };

            if (updateProfileForm) {
                updateProfileForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const newNama = namaInput.value.trim();
                    const newNomorHp = nomorHpInput.value.trim();

                    if (newNama === "") {
                        showMessage("Nama tidak boleh kosong.", 'error');
                        return;
                    }

                    try {
                        const response = await fetch('/api/user/profile', {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            credentials: 'include',
                            body: JSON.stringify({ nama: newNama, phone: newNomorHp }),
                        });
                        const data = await response.json();
                        if (response.ok) {
                            showMessage(data.message, 'success');
                        } else {
                            showMessage(`Gagal memperbarui profil: ${data.message}`, 'error');
                        }
                    } catch (error) {
                        console.error('Error updating profile:', error);
                        showMessage('Terjadi kesalahan saat memperbarui profil.', 'error');
                    }
                });
            }

            if (changePasswordForm) {
                changePasswordForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const currentPassword = currentPasswordInput.value;
                    const newPassword = newPasswordInput.value;
                    const confirmPassword = confirmPasswordInput.value;

                    if (newPassword !== confirmPassword) {
                        showMessage('Kata sandi baru dan konfirmasi kata sandi tidak cocok.', 'error');
                        return;
                    }

                    try {
                        const response = await fetch('/api/user/password', {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            credentials: 'include',
                            body: JSON.stringify({ current_password: currentPassword, new_password: newPassword }),
                        });
                        const data = await response.json();
                        if (response.ok) {
                            showMessage(data.message, 'success');
                            changePasswordForm.reset();
                        } else {
                            showMessage(`Gagal mengubah kata sandi: ${data.message}`, 'error');
                        }
                    } catch (error) {
                        console.error('Error changing password:', error);
                        showMessage('Terjadi kesalahan saat mengubah kata sandi.', 'error');
                    }
                });
            }

            if (deleteAccountButton) {
                deleteAccountButton.addEventListener('click', async () => {
                    if (confirm('Apakah Anda yakin ingin menghapus akun Anda? Tindakan ini tidak dapat dibatalkan.')) {
                        try {
                            const response = await fetch('/api/user', {
                                method: 'DELETE',
                                credentials: 'include',
                            });
                            const data = await response.json();
                            if (response.ok) {
                                showMessage(data.message, 'success');
                                window.location.href = 'login.html';
                            } else {
                                showMessage(`Gagal menghapus akun: ${data.message}`, 'error');
                            }
                        } catch (error) {
                            console.error('Error deleting account:', error);
                            showMessage('Terjadi kesalahan saat menghapus akun.', 'error');
                        }
                    }
                });
            }

            fetchUserData();
        });
    </script>
</body>
</html>
