<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoTrip - Masuk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="bg-blue-50 min-h-screen flex items-center justify-center px-4">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-lg border border-gray-100 p-8">
        <div class="flex items-center justify-center gap-2 text-blue-600 font-black text-3xl mb-2">
            <i class="fa-solid fa-plane"></i>
            <span>GoTrip</span>
        </div>
        <p class="text-center text-gray-500 mb-6">Buat akun baru</p>

        <div id="alert-box" class="hidden mb-4 px-4 py-3 rounded-lg text-sm font-medium"></div>

        <form id="register-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Nama</label>
                <input type="text" id="nama" name="nama" required
                    class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="Nama lengkap">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" id="email" name="email" required
                    class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="nama@email.com">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">No. HP</label>
                <input type="text" id="phone" name="phone"
                    class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="08xxxxxxxxxx">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" id="password" name="password" required minlength="6"
                    class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="Minimal 6 karakter">
            </div>
            <button type="submit" id="register-btn"
                class="w-full bg-blue-600 text-white font-semibold py-2.5 rounded-lg hover:bg-blue-700 transition">
                Daftar
            </button>
        </form>

        <p class="text-center text-sm text-gray-500 mt-6">
            Sudah punya akun?
            <a href="login.html" class="text-blue-600 font-semibold hover:underline">Masuk di sini</a>
        </p>
        <p class="text-center text-sm mt-2">
            <a href="index.html" class="text-gray-400 hover:text-gray-600">
                <i class="fa-solid fa-arrow-left mr-1"></i>Kembali ke Beranda
            </a>
        </p>
    </div>

    <script>
        const form = document.getElementById('register-form');
        const alertBox = document.getElementById('alert-box');
        const registerBtn = document.getElementById('register-btn');

        function showAlert(message, type) {
            alertBox.textContent = message;
            alertBox.classList.remove('hidden', 'bg-red-50', 'text-red-600', 'bg-green-50', 'text-green-600');
            if (type === 'error') {
                alertBox.classList.add('bg-red-50', 'text-red-600');
            } else {
                alertBox.classList.add('bg-green-50', 'text-green-600');
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const nama = document.getElementById('nama').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;

            registerBtn.disabled = true;
            registerBtn.textContent = 'Memproses...';

            try {
                const res = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nama, email, phone, password })
                });
                const result = await res.json();

                if (res.ok) {
                    showAlert('Registrasi berhasil! Mengarahkan ke halaman login...', 'success');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 800);
                } else {
                    showAlert(result.message || 'Registrasi gagal!', 'error');
                    registerBtn.disabled = false;
                    registerBtn.textContent = 'Daftar';
                }
            } catch (err) {
                showAlert('Tidak dapat terhubung ke server.', 'error');
                registerBtn.disabled = false;
                registerBtn.textContent = 'Daftar';
            }
        });
    </script>
</body>

</html>
