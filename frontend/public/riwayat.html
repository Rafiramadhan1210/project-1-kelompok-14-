<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoTrip - Riwayat</title>
    <link rel="stylesheet" href="./output.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="bg-gray-50 min-h-screen">

    <header class="bg-white border-b border-gray-100 sticky top-0 z-50">
        <div class="container mx-auto px-6 py-4 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2 text-blue-600 font-black text-2xl">
                <i class="fa-solid fa-plane"></i>
                <span>GoTrip</span>
            </a>
            <a href="index.html" class="text-gray-500 hover:text-gray-700 font-medium flex items-center gap-2">
                <i class="fa-solid fa-arrow-left"></i>
                <span class="hidden sm:inline">Kembali ke Beranda</span>
            </a>
        </div>
    </header>

    <main class="container mx-auto px-6 py-10 max-w-3xl">
        <div class="mb-8">
            <h1 class="text-2xl font-bold text-gray-800">Riwayat</h1>
            <p class="text-gray-500 mt-1">Booking yang sudah selesai atau dibatalkan.</p>
        </div>

        <div id="loading-state" class="text-center py-16 text-gray-400">
            <i class="fa-solid fa-circle-notch fa-spin text-3xl mb-3"></i>
            <p>Memuat riwayat kamu...</p>
        </div>

        <div id="login-required" class="hidden text-center py-16 bg-white rounded-2xl border border-gray-100">
            <i class="fa-solid fa-lock text-3xl text-gray-300 mb-3"></i>
            <p class="text-gray-600 font-medium">Kamu belum login</p>
            <p class="text-gray-400 text-sm mt-1">Masuk dulu untuk melihat riwayat kamu.</p>
            <a href="login.html" class="inline-block mt-4 bg-blue-600 text-white px-5 py-2 rounded-lg font-semibold hover:bg-blue-700 transition">Masuk</a>
        </div>

        <div id="empty-state" class="hidden text-center py-16 bg-white rounded-2xl border border-gray-100">
            <i class="fa-solid fa-clock-rotate-left text-3xl text-gray-300 mb-3"></i>
            <p class="text-gray-600 font-medium">Belum ada riwayat</p>
            <p class="text-gray-400 text-sm mt-1">Booking yang selesai atau dibatalkan akan muncul di sini.</p>
        </div>

        <div id="booking-list" class="space-y-4"></div>
    </main>

    <script>
        const STATUS_BADGE = {
            'Selesai':    'bg-green-100 text-green-700',
            'Dibatalkan': 'bg-red-100 text-red-700',
        };

        const STATUS_ICON = {
            'Selesai':    'fa-circle-check',
            'Dibatalkan': 'fa-circle-xmark',
        };

        function formatTanggal(isoString) {
            if (!isoString) return '-';
            const d = new Date(isoString);
            return d.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
        }

        function formatTanggalKunjungan(str) {
            if (!str) return '-';
            const [y, m, d] = str.split('-');
            if (!y || !m || !d) return str;
            const months = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
            return `${parseInt(d)} ${months[parseInt(m)-1]} ${y}`;
        }

        function renderBooking(item) {
            const badgeClass = STATUS_BADGE[item.status] || 'bg-gray-100 text-gray-700';
            const icon = STATUS_ICON[item.status] || 'fa-circle';

            const buktiBayarHTML = item.bukti_bayar
                ? `<a href="${item.bukti_bayar}" target="_blank" class="inline-flex items-center gap-1 text-blue-600 hover:underline text-xs font-medium mt-1">
                       <i class="fa-solid fa-file-image"></i> Lihat Bukti Bayar
                   </a>`
                : '';

            const cancelledNote = item.status === 'Dibatalkan'
                ? `<div class="mt-3 pt-3 border-t border-gray-100 bg-red-50 rounded-xl px-3 py-2 flex items-start gap-2 text-xs text-red-600">
                       <i class="fa-solid fa-circle-xmark mt-0.5"></i>
                       <span>Booking ini telah dibatalkan.</span>
                   </div>`
                : '';

            const completedNote = item.status === 'Selesai'
                ? `<div class="mt-3 pt-3 border-t border-gray-100 bg-green-50 rounded-xl px-3 py-2 flex items-start gap-2 text-xs text-green-700">
                       <i class="fa-solid fa-circle-check mt-0.5"></i>
                       <span>Perjalanan selesai. Terima kasih sudah menggunakan GoTrip!</span>
                   </div>`
                : '';

            return `
                <div class="bg-white rounded-2xl border border-gray-100 p-5 hover:shadow-md transition opacity-90">
                    <div class="flex items-start justify-between gap-4">
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2 mb-2 flex-wrap">
                                <h3 class="font-bold text-gray-700 truncate">${item.destination || 'Destinasi'}</h3>
                                <span class="inline-flex items-center gap-1 text-xs font-semibold px-2.5 py-1 rounded-full ${badgeClass}">
                                    <i class="fa-solid ${icon} text-xs"></i> ${item.status}
                                </span>
                            </div>

                            <div class="grid grid-cols-2 gap-x-4 gap-y-1 text-sm text-gray-500 mb-2">
                                <div class="flex items-center gap-1.5">
                                    <i class="fa-solid fa-calendar-day text-gray-400 w-4 text-center"></i>
                                    <span>Kunjungan: <span class="text-gray-600 font-medium">${formatTanggalKunjungan(item.tanggal_kunjungan)}</span></span>
                                </div>
                                <div class="flex items-center gap-1.5">
                                    <i class="fa-solid fa-ticket text-gray-400 w-4 text-center"></i>
                                    <span>${item.total_tiket || 0} peserta</span>
                                </div>
                                <div class="flex items-center gap-1.5">
                                    <i class="fa-solid fa-phone text-gray-400 w-4 text-center"></i>
                                    <span>${item.no_hp || '-'}</span>
                                </div>
                                <div class="flex items-center gap-1.5">
                                    <i class="fa-solid fa-clock text-gray-400 w-4 text-center"></i>
                                    <span>Dibuat ${formatTanggal(item.created_at)}</span>
                                </div>
                            </div>

                            ${buktiBayarHTML}
                        </div>

                        <div class="text-right shrink-0">
                            <p class="text-gray-600 font-bold text-lg">Rp ${(item.total_bayar || 0).toLocaleString('id-ID')}</p>
                            <p class="text-xs text-gray-400">Total bayar</p>
                        </div>
                    </div>

                    ${cancelledNote}
                    ${completedNote}
                </div>
            `;
        }

        async function loadBookings() {
            const loadingState = document.getElementById('loading-state');
            const loginRequired = document.getElementById('login-required');
            const emptyState = document.getElementById('empty-state');
            const list = document.getElementById('booking-list');

            try {
                const res = await fetch('/api/my-bookings?status=Selesai,Dibatalkan', { credentials: 'include' });

                if (res.status === 401) {
                    loadingState.classList.add('hidden');
                    loginRequired.classList.remove('hidden');
                    return;
                }

                if (!res.ok) throw new Error('Gagal memuat riwayat');

                const result = await res.json();
                const bookings = result.data || [];

                loadingState.classList.add('hidden');

                if (bookings.length === 0) {
                    emptyState.classList.remove('hidden');
                    return;
                }

                list.innerHTML = bookings.map(renderBooking).join('');
            } catch (err) {
                loadingState.innerHTML = `
                    <div class="text-center py-16">
                        <i class="fa-solid fa-triangle-exclamation text-3xl text-red-300 mb-3"></i>
                        <p class="text-red-500">Tidak dapat memuat riwayat. Coba refresh halaman.</p>
                    </div>
                `;
            }
        }

        loadBookings();
    </script>
</body>

</html>
