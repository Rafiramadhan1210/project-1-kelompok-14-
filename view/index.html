<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoTrip - Booking Destinasi Wisata</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="bg-blue-50">

    <!-- Header Sederhana -->
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="container mx-auto px-6 py-4">
            <div class="flex items-center gap-2 text-blue-600 font-black text-2xl">
                <i class="fa-solid fa-map-location-dot"></i> GoTrip
            </div>
        </div>
    </nav>

    <!-- Banner Pencarian -->
    <section class="bg-blue-600 py-12 px-6">
        <div class="container mx-auto text-center">
            <h1 class="text-3xl font-bold text-white mb-6">Cari & Booking Destinasi Favoritmu</h1>
            <div class="bg-white p-3 rounded-xl shadow-lg max-w-2xl mx-auto flex gap-2">
                <input type="text" placeholder="Mau liburan ke mana?"
                    class="flex-1 px-4 py-2 focus:outline-none font-medium">
                <button
                    class="bg-yellow-400 text-blue-900 px-6 py-2 rounded-lg font-bold hover:bg-yellow-500">Cari</button>
            </div>
        </div>
    </section>

    <!-- Daftar Destinasi -->
    <main class="container mx-auto px-6 py-10">
        <div id="destinasi-list" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Data dari database Go muncul di sini -->
        </div>
    </main>

    <script>
        fetch('/button')
            .then(res => res.json())
            .then(result => {
                const list = document.getElementById('destinasi-list');
                result.data.forEach(item => {
                    list.innerHTML += `
                        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-md transition">
                            <div class="p-5">
                                <span class="text-xs font-bold text-blue-500 bg-blue-50 px-3 py-1 rounded-full">${item.kategori}</span>
                                <h3 class="text-xl font-bold text-gray-800 mt-3">${item.nama}</h3>
                                <p class="text-sm text-gray-500 mt-2 line-clamp-2">${item.deskripsi}</p>
                                <div class="mt-6 flex justify-between items-center">
                                    <span class="text-orange-500 font-bold text-lg">
                                        Rp ${item.harga ? item.harga.toLocaleString('id-ID') : '0'}
</span>
                                    <button class="bg-blue-600 text-white px-5 py-2 rounded-lg font-semibold hover:bg-blue-700 transition">Booking</button>
                                </div>
                            </div>
                        </div>
                    `;
                });
            })
            .catch(err => console.error("Error load destinasi:", err));
    </script>
</body>

</html>
